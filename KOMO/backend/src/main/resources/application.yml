# KOMO Backend — application.yml
server:
  port: 8081

spring:
  application:
    name: komo-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/komo
    username: ${DB_USER:komo}
    password: ${DB_PASSWORD:komo}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 虚拟线程 — JDK 21 特性，SSE 长连接不再吃满线程池
  threads:
    virtual:
      enabled: true

# JWT 配置
komo:
  jwt:
    secret: ${JWT_SECRET:CHANGE-ME-IN-PRODUCTION-USE-256-BIT-KEY}
    access-token-expiration: 900000      # 15 min (ms)
    refresh-token-expiration: 604800000  # 7 days (ms)
